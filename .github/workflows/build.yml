name: Build XPIZ Material APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-linux-android

      # --- BAGIAN CACHE MULAI ---
      - name: Cache Rust & xbuild
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-xbuild-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-xbuild-
      # --- BAGIAN CACHE SELESAI ---

      - name: Install xbuild
        run: |
          if ! command -v x &> /dev/null; then
            cargo install --git https://github.com/burhankhanzada/xbuild --rev 5eb203e9e0718bd992632b803d59bed80ae0bdc0 xbuild
          fi

      - name: Build APK
        run: |
          x build --platform android --arch arm64 --release --format 'apk'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xpiz-material-apk
          path: target/x/release/android/*.apk
